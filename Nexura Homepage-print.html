<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexura — A studio for the considered web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F4EEFF; color: #1B1428;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  img { display: block; } em { font-style: italic; } button { font: inherit; }
  input:focus, textarea:focus { border-color: #402060 !important; }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body {
      background: #F4EEFF !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    /* Avoid splitting key blocks across pages */
    section, header, footer, article { break-inside: avoid; }
    /* Remove any hover/transition effects */
    * { transition: none !important; animation: none !important; }
    /* Hide any floating tweaks UI if present */
    [data-tweaks-panel], [data-om-ignore] { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel">
  // Auto-print once fonts and React have rendered
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    // Wait for React to mount content
    const waitForRoot = () => new Promise((resolve) => {
      const check = () => {
        const r = document.getElementById('root');
        if (r && r.children.length > 0) resolve();
        else requestAnimationFrame(check);
      };
      check();
    });
    await waitForRoot();
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
