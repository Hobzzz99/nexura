<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexura — A studio for the considered web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F4EEFF; color: #1B1428;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
    img { display: block; } em { font-style: italic; } button { font: inherit; }
  input:focus, textarea:focus { border-color: #402060 !important; }

  /* Splash Loading Screen */
  .nx-splash {
    position: fixed; inset: 0;
    background: #F4EEFF;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .nx-splash-inner {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .nx-splash-logo {
    width: 50px; height: 60px;
    opacity: 0.85;
  }
  .nx-splash-logo path {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: nx-draw 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
  }
  .nx-splash-logo path:nth-child(1) { animation-delay: 0s; }
  .nx-splash-logo path:nth-child(2) { animation-delay: 0.15s; }
  .nx-splash-logo path:nth-child(3) { animation-delay: 0.3s; }
  .nx-splash-logo path:nth-child(4) { animation-delay: 0.05s; }
  .nx-splash-logo path:nth-child(5) { animation-delay: 0.2s; }
  .nx-splash-logo path:nth-child(6) { animation-delay: 0.35s; }

  @keyframes nx-draw {
    0% { stroke-dashoffset: 120; }
    45% { stroke-dashoffset: 0; }
    70% { stroke-dashoffset: 0; opacity: 1; }
    90% { stroke-dashoffset: 0; opacity: 0; }
    100% { stroke-dashoffset: -120; opacity: 0; }
  }
  .nx-splash-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: #402060;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0;
    animation: nx-fade-in 1.5s ease-out forwards;
    animation-delay: 0.3s;
  }
  @keyframes nx-fade-in {
    to { opacity: 0.75; }
  }
  .nx-splash-loader {
    width: 100px; height: 1px;
    background: rgba(64, 32, 96, 0.1);
    position: relative;
    overflow: hidden;
  }
  .nx-splash-progress {
    position: absolute; left: 0; top: 0; bottom: 0; width: 40px;
    background: #6B3EA0;
    animation: nx-progress 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  @keyframes nx-progress {
    0% { left: -40px; }
    100% { left: 100px; }
  }
</style>
</head>
<body>
<div id="root">
  <div class="nx-splash">
    <div class="nx-splash-inner">
      <svg class="nx-splash-logo" viewBox="0 0 100 120">
        <path d="M 20 15 L 20 105" stroke="#402060" stroke-width="1.6" fill="none" stroke-linecap="round" />
        <path d="M 20 18 L 80 102" stroke="#402060" stroke-width="1.6" fill="none" stroke-linecap="round" />
        <path d="M 80 15 L 80 105" stroke="#402060" stroke-width="1.6" fill="none" stroke-linecap="round" />
        <path d="M 24 12 L 24 102" stroke="#402060" stroke-width="0.96" fill="none" stroke-linecap="round" opacity="0.4" />
        <path d="M 24 15 L 84 99" stroke="#402060" stroke-width="0.96" fill="none" stroke-linecap="round" opacity="0.4" />
        <path d="M 84 12 L 84 102" stroke="#402060" stroke-width="0.96" fill="none" stroke-linecap="round" opacity="0.4" />
      </svg>
      <div class="nx-splash-brand">Nexura</div>
      <div class="nx-splash-loader">
        <div class="nx-splash-progress"></div>
      </div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
</body>
</html>
